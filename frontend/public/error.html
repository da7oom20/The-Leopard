<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Service Unavailable - The Leopard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#09090b;color:#d4d4d8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{max-width:28rem;width:100%;background:#18181b;border:1px solid #3f3f46;border-radius:.75rem;padding:2.5rem;text-align:center}
.icon{margin:0 auto 1.5rem;width:3.5rem;height:3.5rem}
.icon svg{width:100%;height:100%;color:#f59e0b}
h1{font-size:1.5rem;font-weight:700;color:#fafafa;margin-bottom:.5rem}
.code{font-size:3rem;font-weight:800;color:#3f3f46;margin-bottom:.25rem}
p{color:#a1a1aa;line-height:1.6;margin-bottom:1.5rem;font-size:.95rem}
.actions{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap}
button,a.btn{display:inline-block;padding:.625rem 1.5rem;border-radius:.375rem;font-size:.875rem;font-weight:500;cursor:pointer;text-decoration:none;border:none;transition:background .15s}
.btn-primary{background:#4f46e5;color:#fff}
.btn-primary:hover{background:#4338ca}
.btn-secondary{background:#27272a;color:#d4d4d8}
.btn-secondary:hover{background:#3f3f46}
.countdown{color:#71717a;font-size:.8rem;margin-top:1rem}
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
  </div>
  <div class="code" id="errCode">503</div>
  <h1 id="errTitle">Service Unavailable</h1>
  <p id="errMsg">The backend service is temporarily unavailable. This usually resolves within a few moments.</p>
  <div class="actions">
    <button class="btn-primary" onclick="location.reload()">Try Again</button>
    <a class="btn btn-secondary" href="/">Go Home</a>
  </div>
  <div class="countdown" id="countdown"></div>
</div>
<script>
(function(){
  var msgs={
    502:{title:'Bad Gateway',msg:'The backend service is not responding. It may be restarting or experiencing issues.'},
    503:{title:'Service Unavailable',msg:'The backend service is temporarily unavailable. This usually resolves within a few moments.'},
    504:{title:'Gateway Timeout',msg:'The backend service took too long to respond. This may happen during heavy searches or large exports.'}
  };
  // Nginx substitutes $status via ssi or we detect from the page URL/referrer
  var status=parseInt(new URLSearchParams(window.location.search).get('status'))||503;
  var info=msgs[status]||msgs[503];
  document.getElementById('errCode').textContent=status;
  document.getElementById('errTitle').textContent=info.title;
  document.getElementById('errMsg').textContent=info.msg;
  document.title=info.title+' - The Leopard';
  // Auto-retry countdown
  var secs=15;
  var el=document.getElementById('countdown');
  var t=setInterval(function(){
    secs--;
    if(secs<=0){clearInterval(t);location.reload();return}
    el.textContent='Auto-retrying in '+secs+'s...';
  },1000);
  el.textContent='Auto-retrying in '+secs+'s...';
})();
</script>
</body>
</html>
